<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monday Sync</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }

    .box{
      width:700px;
      background:#111827;
      padding:30px;
      border-radius:16px;
    }

    textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:12px;
      padding:14px;
      font-size:14px;
      background:#020617;
      color:#22c55e;
      margin-top:12px;
    }

    button{
      margin-top:20px;
      background:#22c55e;
      color:black;
      border:none;
      padding:14px 24px;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      font-size:15px;
    }

    #log{
      margin-top:20px;
      background:#020617;
      padding:15px;
      border-radius:10px;
      white-space:pre-wrap;
      color:#93c5fd;
      min-height:120px;
    }

  </style>

</head>
<body>

<div class="box">

<h1>Monday → Supabase Sync</h1>

<p>
Pega tu token Monday:
</p>

<textarea id="token"></textarea>

<button onclick="syncMonday()">
Sincronizar Semana Actual
</button>

<div id="log"></div>

</div>

<script>

const MONDAY_BOARD_ID = 18403062987;

const MONDAY_API_URL = 'https://api.monday.com/v2';

const SUPABASE_URL =
'https://auclvnesasgjmwkoswwj.supabase.co';

const SUPABASE_KEY =
'sb_publishable_p6MgGIEpSUHA2OG1aNLRxQ_RSh9edpZ';

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function log(msg){

  const el =
    document.getElementById('log');

  el.innerHTML += msg + '\n';
}

function getWeekNumber() {

  const now = new Date();

  const start = new Date(
    now.getFullYear(),
    0,
    1
  );

  const days = Math.floor(
    (now - start) /
    (24 * 60 * 60 * 1000)
  );

  return Math.ceil(
    (days + start.getDay() + 1) / 7
  );
}

async function syncMonday(){

  document.getElementById('log')
    .innerHTML = '';

  const token =
    document.getElementById('token')
    .value
    .trim();

  if(!token){

    alert('Pega tu token Monday');

    return;
  }

  try {

    const week = getWeekNumber();

    const targetGroup =
      `SEMANA ${week}`;

    log(
      'Buscando grupo: ' +
      targetGroup
    );

    const query = `
      query {
        boards(ids: ${MONDAY_BOARD_ID}) {
          groups {
            id
            title

            items_page(limit: 500) {
              items {
                id
                name

                column_values {
                  id
                  text
                }
              }
            }
          }
        }
      }
    `;

    const response = await fetch(
      MONDAY_API_URL,
      {
        method:'POST',

        headers:{
          'Content-Type':'application/json',
          'Authorization': token
        },

        body: JSON.stringify({
          query
        })
      }
    );

    const result =
      await response.json();

    console.log(result);

    const groups =
      result.data.boards[0].groups;

    const currentGroup =
      groups.find(
        g =>
          g.title.toUpperCase() ===
          targetGroup.toUpperCase()
      );

    if(!currentGroup){

      log(
        'No existe ' +
        targetGroup
      );

      return;
    }

    const items =
      currentGroup.items_page.items;

    log(
      items.length +
      ' items encontrados'
    );

    const rows =
      items.map(item => {

        const cols = {};

        item.column_values.forEach(c => {

          cols[c.id] = c.text;
        });

        console.log(
          'ITEM:',
          item.name
        );

        console.log(
          'COLS:',
          cols
        );

        return {

          orden:
            item.name,

          cliente:
            cols.people ||
            cols.person ||
            cols.ejecutivo ||
            '',

          estilo:
            cols.text ||
            cols.text0 ||
            '',

          cantidad:
            Number(
              cols.numbers ||
              cols.cantidad ||
              0
            ),

          estado:
            cols.status ||
            cols.estado ||
            '',

          ex_date:
            cols.date ||
            cols.despacho ||
            '',

          semana:
            targetGroup
        };

      });

    log(
      'Limpiando tabla...'
    );

    await supabaseClient
      .from('monday_orders')
      .delete()
      .neq('id',0);

    log(
      'Insertando datos...'
    );

    const { error } =
      await supabaseClient
      .from('monday_orders')
      .insert(rows);

    if(error){

      console.error(error);

      log(
        'ERROR: ' +
        error.message
      );

      return;
    }

    log(
      '✅ ' +
      rows.length +
      ' órdenes sincronizadas'
    );

  } catch(err){

    console.error(err);

    log(
      'ERROR GENERAL'
    );

    log(err.message);
  }
}

</script>

</body>
</html>
