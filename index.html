<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monday Sync v4</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
    .box{width:820px;background:#111827;padding:30px;border-radius:16px}
    textarea{width:100%;height:120px;border:none;border-radius:12px;padding:14px;font-size:14px;background:#020617;color:#22c55e;margin-top:12px}
    button{margin-top:20px;background:#22c55e;color:black;border:none;padding:14px 24px;border-radius:10px;font-weight:bold;cursor:pointer;font-size:15px}
    #log{margin-top:20px;background:#020617;padding:15px;border-radius:10px;white-space:pre-wrap;color:#93c5fd;min-height:180px}
    .note{color:#facc15}
  </style>
</head>
<body>
<div class="box">
  <h1>Monday → Supabase Sync</h1>
  <p class="note"><b>VERSIÓN v4 FINAL</b> — usa el orden real de columnas del board y corrige Ejecutivo.</p>
  <p>Pega tu token Monday:</p>
  <textarea id="token"></textarea>
  <button onclick="syncMonday()">Sincronizar Semana Actual</button>
  <div id="log"></div>
</div>

<script>
const MONDAY_BOARD_ID = 18403062987;
const MONDAY_API_URL = 'https://api.monday.com/v2';
const SUPABASE_URL = 'https://auclvnesasgjmwkoswwj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_p6MgGIEpSUHA2OG1aNLRxQ_RSh9edpZ';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const EJECUTIVOS_CONOCIDOS = [
  'Katherine Morales',
  'Thelma Guzman',
  'Berreondo Eric',
  'Valerie Ardon',
  'Gabriela del Cid',
  'Elisa Paniagua',
  'Gladis Toj',
  'Mildred Polanco'
];

function log(msg){ document.getElementById('log').innerHTML += msg + '\n'; }

function norm(v){
  return String(v || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[\s_\-\/\.]+/g,' ')
    .trim()
    .toUpperCase();
}

function getWeekNumber(){
  const now = new Date();
  const start = new Date(now.getFullYear(),0,1);
  const days = Math.floor((now - start)/(24*60*60*1000));
  return Math.ceil((days + start.getDay() + 1)/7);
}

function isBad(v){
  const s = String(v || '').trim();
  return !s || s === '-' || /^pend\.?$/i.test(s) || /^null$/i.test(s);
}

function byTitle(cols, names){
  for(const name of names){
    const key = norm(name);
    if(cols[key] !== undefined && !isBad(cols[key])) return cols[key];
  }
  return '';
}

function byIndex(values, index){
  const v = values[index];
  return isBad(v) ? '' : v;
}

function findExecutive(cols, values){
  let v = byTitle(cols, ['Ejecutivo', 'EJECUTIVO']);
  if(!isBad(v)) return v;

  for(const name of EJECUTIVOS_CONOCIDOS){
    const found = values.find(x => norm(x) === norm(name));
    if(found) return found;
  }

  const candidate = values.find(x => {
    const s = String(x || '').trim();
    return /^[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+/.test(s)
      && !/MEN|WOMEN|RANDA|VAN HEUSEN|BLACK|BROWN|TAN|NAVY|CORTE|TROQUEL|ESTAMPADO|PEND/i.test(s);
  });

  return candidate || '';
}

function toNumber(v){
  const n = Number(String(v || '').replace(/,/g,'').trim());
  return Number.isFinite(n) ? n : 0;
}

function toDateOrNull(v){
  if(!v) return null;
  const s = String(v).trim();
  if(!s) return null;
  const d = new Date(s);
  if(!isNaN(d)) return d.toISOString().slice(0,10);

  const m = s.match(/(\d{1,2})\s+([a-záéíóúñ]+)\.?\s*(\d{1,2}:\d{2})?/i);
  if(m){
    const months = {
      ene:0, enero:0, feb:1, febrero:1, mar:2, marzo:2, abr:3, abril:3,
      may:4, mayo:4, jun:5, junio:5, jul:6, julio:6, ago:7, agosto:7,
      sep:8, sept:8, septiembre:8, oct:9, octubre:9, nov:10, noviembre:10,
      dic:11, diciembre:11
    };
    const mon = months[norm(m[2]).toLowerCase().replace('.', '')];
    if(mon !== undefined){
      const y = new Date().getFullYear();
      const dd = Number(m[1]);
      return new Date(y, mon, dd).toISOString().slice(0,10);
    }
  }

  return null;
}

async function syncMonday(){
  document.getElementById('log').innerHTML = '';
  const token = document.getElementById('token').value.trim();
  if(!token){ alert('Pega tu token Monday'); return; }

  try{
    const week = getWeekNumber();
    const targetGroup = `SEMANA ${week}`;
    log('Buscando grupo: ' + targetGroup);

    const query = `
      query {
        boards(ids: ${MONDAY_BOARD_ID}) {
          columns { id title }
          groups {
            id
            title
            items_page(limit: 500) {
              items {
                id
                name
                column_values { id text }
              }
            }
          }
        }
      }
    `;

    const response = await fetch(MONDAY_API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization': token },
      body: JSON.stringify({query})
    });

    const result = await response.json();
    console.log('MONDAY RESULT:', result);

    if(result.errors){
      log('ERROR MONDAY: ' + JSON.stringify(result.errors));
      return;
    }

    const board = result.data.boards[0];
    const titleById = {};
    board.columns.forEach(c => { titleById[c.id] = c.title; });

    log('Columnas del board detectadas: ' + board.columns.length);
    console.log('COLUMNAS BOARD:', titleById);

    const currentGroup = board.groups.find(g => g.title.toUpperCase() === targetGroup.toUpperCase());
    if(!currentGroup){ log('No existe ' + targetGroup); return; }

    const items = currentGroup.items_page.items;
    log(items.length + ' items encontrados');

    const rows = items.map(item => {
      const cols = {};
      const values = [];

      item.column_values.forEach(c => {
        const title = titleById[c.id] || c.id;
        const text = c.text || '';
        cols[norm(title)] = text;
        values.push(text);
      });

      console.log('ITEM:', item.name);
      console.log('COLS:', cols);
      console.log('VALUES:', values);

      const ejecutivo = findExecutive(cols, values);

      // Fallback por posición visible del board de SEMANA 22:
      // B=0, ESTADO=1, TOTAL=2, REPO=3, esta=4, DESPACHO=5, L=6, Cantidad=7, Ejecutivo=8, tipo/proyecto=9
      const estado = byTitle(cols, ['ESTADO FABRICACION']) || byIndex(values, 1);
      const total = byTitle(cols, ['TOTAL']) || byIndex(values, 2);
      const cantidad = byTitle(cols, ['Cantidad', 'CANTIDAD']) || byIndex(values, 7) || total;
      const despacho = byTitle(cols, ['DESPACHO']) || byIndex(values, 5);
      const exDate = byTitle(cols, ['Ex-date', 'EX DATE']);
      const tipo = byTitle(cols, ['tipo/proyecto', 'Tipo Proyecto']) || byIndex(values, 9);

      return {
        orden: item.name,
        cliente: ejecutivo,
        estilo: item.name,
        tipo: tipo || null,
        cantidad: toNumber(cantidad),
        estado: estado || null,
        ex_date: toDateOrNull(exDate) || toDateOrNull(despacho),
        semana: targetGroup
      };
    });

    log('Primera fila enviada:');
    log(JSON.stringify(rows[0], null, 2));

    log('Limpiando tabla...');
    const { error: delError } = await supabaseClient
      .from('monday_orders')
      .delete()
      .neq('orden','___nunca___');

    if(delError){ log('ERROR limpiando: ' + delError.message); return; }

    log('Insertando datos...');
    const { error } = await supabaseClient
      .from('monday_orders')
      .insert(rows);

    if(error){ console.error(error); log('ERROR: ' + error.message); return; }

    const sinEjecutivo = rows.filter(r => !r.cliente).length;
    log('✅ ' + rows.length + ' órdenes sincronizadas');
    log('Sin Ejecutivo detectado: ' + sinEjecutivo);

  }catch(err){
    console.error(err);
    log('ERROR GENERAL');
    log(err.message);
  }
}
</script>
</body>
</html>
