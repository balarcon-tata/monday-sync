name: Monday Sync

on:

  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 20

      - name: Run Sync
        run: node sync.js

        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
